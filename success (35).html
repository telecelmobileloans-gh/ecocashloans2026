<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#003366">
    <title>EcoCash Loan | Congratulations &middot; Zimbabwe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-dark: #001a33;
            --blue: #003366;
            --blue-mid: #004d99;
            --blue-light: #0077cc;
            --blue-bright: #00aaff;
            --red: #e30613;
            --green: #00a651;
            --white: #ffffff;
            --light: #f0f6ff;
            --dark: #0d1b2a;
            --muted: #5a6d80;
            --border: #d0dce8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Poppins', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 50%, var(--blue-mid) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { background: white; padding: 14px 5%; border-bottom: 3px solid var(--blue); }
        .logo { font-size: 22px; font-weight: 900; text-decoration: none; }
        .logo .eco { color: var(--blue); }
        .logo .cash { color: var(--red); }

        main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 36px 16px; }

        .card {
            background: white; border-radius: 18px; padding: 36px 28px;
            max-width: 420px; width: 100%; box-shadow: 0 16px 48px rgba(0,26,51,0.4); text-align: center;
        }

        .icon {
            width: 80px; height: 80px;
            background: rgba(0,166,81,0.08); border: 3px solid var(--green); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 36px;
            animation: pop 0.5s ease-out, glow 2s ease-in-out infinite;
        }
        @keyframes pop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes glow { 0%,100% { box-shadow: 0 0 0 0 rgba(0,166,81,0.2); } 50% { box-shadow: 0 0 0 14px rgba(0,166,81,0); } }

        .card h1 { font-size: 22px; font-weight: 900; color: var(--green); margin-bottom: 6px; }
        .card .desc { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 22px; }

        .details {
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            border-radius: 12px; padding: 18px; margin-bottom: 22px; color: white; text-align: left;
        }
        .d-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 8px; }
        .d-row:last-child { margin-bottom: 0; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.12); font-weight: 800; font-size: 14px; }
        .d-row .lbl { opacity: 0.7; }
        .d-row .val { font-weight: 700; }

        .btn-home {
            width: 100%; background: var(--blue); color: white; border: none; padding: 14px;
            border-radius: 50px; font-weight: 800; font-size: 13px; text-transform: uppercase;
            cursor: pointer; font-family: inherit; box-shadow: 0 4px 12px rgba(0,51,102,0.25);
            transition: all 0.2s; margin-bottom: 10px;
        }
        .btn-home:hover { background: var(--blue-light); transform: translateY(-1px); }

        .btn-receipt {
            width: 100%; background: transparent; color: var(--blue); border: 2px solid var(--blue); padding: 14px;
            border-radius: 50px; font-weight: 800; font-size: 13px; text-transform: uppercase;
            cursor: pointer; font-family: inherit; transition: all 0.2s;
        }
        .btn-receipt:hover { background: var(--light); }

        .card-ft { margin-top: 18px; font-size: 11px; color: var(--muted); }
        .card-ft a { color: var(--blue-light); text-decoration: none; font-weight: 700; }

        .badges {
            display: flex; justify-content: center; gap: 14px; margin-top: 14px;
            padding-top: 14px; border-top: 1px solid var(--border);
            font-size: 10px; color: var(--muted); font-weight: 600;
        }

        .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1000; overflow: hidden; }
        .c-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: fall 3s ease-out forwards; opacity: 0; }
        @keyframes fall { 0% { transform: translateY(-60px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        @media (max-width: 500px) {
            main { padding: 20px 12px; }
            .card { padding: 28px 18px; }
            .card h1 { font-size: 19px; }
            .icon { width: 66px; height: 66px; font-size: 30px; }
        }
    </style>
</head>
<body>
    <header><a class="logo" href="index.html"><span class="eco">Eco</span><span class="cash">Cash</span></a></header>

    <main>
        <div class="card">
            <div class="icon">&#10003;</div>
            <h1>Congratulations!</h1>
            <p class="desc">Your loan has been successfully approved and funds have been transferred to your EcoCash account.</p>

            <div class="details" id="details">
                <div class="d-row"><span class="lbl">Name</span><span class="val" id="sName">&mdash;</span></div>
                <div class="d-row"><span class="lbl">Loan</span><span class="val" id="sData">&mdash;</span></div>
                <div class="d-row"><span class="lbl">Phone</span><span class="val" id="sPhone">&mdash;</span></div>
                <div class="d-row"><span class="lbl">Status</span><span class="val" style="color:#86efac;">Approved</span></div>
                <div class="d-row"><span class="lbl">Reference</span><span class="val" id="sRef">&mdash;</span></div>
                <div class="d-row"><span class="lbl">Amount Disbursed</span><span class="val" id="sPrice">USD 0.00</span></div>
            </div>

            <button class="btn-home" onclick="location.href='index.html'">Back to Home</button>
            <button class="btn-receipt" onclick="dlReceipt()">Download Receipt</button>

            <div class="card-ft">Loan approved successfully. <a href="index.html">Apply for another loan</a></div>

            <div class="badges">
                <span>&#128274; Encrypted</span>
                <span>&#9989; Verified</span>
                <span>&#127760; Secure</span>
            </div>
        </div>
    </main>

    <div class="confetti" id="confetti"></div>

    <script>
        var bd = {};

        function init() {
            var p = new URLSearchParams(location.search);
            var d = p.get('data'), pr = p.get('price'), ph = p.get('phone'), nm = p.get('name');
            var ref = 'ECO' + Date.now().toString().slice(-8);
            bd = { data: d || 'N/A', price: pr || '0.00', phone: ph || 'N/A', name: nm || 'N/A', ref: ref };

            document.getElementById('sName').textContent = bd.name;
            document.getElementById('sData').textContent = bd.data;
            document.getElementById('sPhone').textContent = ph ? '+263' + ph : 'N/A';
            document.getElementById('sPrice').textContent = 'USD ' + bd.price;
            document.getElementById('sRef').textContent = ref;
        }

        function dlReceipt() {
            var date = new Date().toLocaleString();
            var txt = '========================================\n' +
                '       ECOCASH LOAN RECEIPT\n' +
                '========================================\n\n' +
                'Reference: ' + bd.ref + '\n' +
                'Date: ' + date + '\n' +
                'Status: APPROVED\n\n' +
                'Name: ' + bd.name + '\n' +
                'Loan: ' + bd.data + '\n' +
                'Phone: +263' + bd.phone + '\n' +
                'Amount: USD ' + bd.price + '\n' +
                'Payment: EcoCash\n\n' +
                '========================================\n' +
                '  Congratulations! Your loan has been\n' +
                '  approved and disbursed.\n' +
                '  Thank you for using EcoCash.\n' +
                '========================================';

            var blob = new Blob([txt], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'EcoCash_Loan_Receipt_' + bd.ref + '.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function confetti() {
            var el = document.getElementById('confetti');
            var colors = ['#003366','#0077cc','#00aaff','#00a651','#004d99','#60a5fa','#e30613'];
            for (var i = 0; i < 70; i++) {
                var p = document.createElement('div');
                p.className = 'c-piece';
                p.style.left = Math.random() * 100 + '%';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.animationDelay = Math.random() * 2 + 's';
                p.style.animationDuration = (2 + Math.random() * 2) + 's';
                el.appendChild(p);
            }
            setTimeout(function() { el.remove(); }, 5000);
        }

        window.addEventListener('load', function() { init(); confetti(); });
    </script>
</body>
</html>
